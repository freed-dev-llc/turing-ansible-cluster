name: Bug Report
description: Report a problem with the playbooks or configuration
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System and tool versions.
      placeholder: |
        OS: Armbian Bookworm
        Ansible version: 2.16.x
        K3s version: 1.30.x
        Hardware: Turing Pi 2.5 with RK1 modules
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `ansible-playbook ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell
